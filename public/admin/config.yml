backend:
  name: github
  repo: marcorosso-collab/Exploreans-Brand-Site
  branch: main
  base_url: https://openclaw.onrender.com
  auth_endpoint: auth

media_folder: "public/images"
public_folder: "/images"

publish_mode: editorial_workflow

site_url: https://exploreans.com
display_url: https://exploreans.com
logo_url: /images/og/exploreans-logo.png

collections:

  # ═══════════════════════════════════════════════════════════
  # SITE SETTINGS
  # ═══════════════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    description: "Global site settings — SEO, social, nav, footer"
    files:
      - name: "general"
        label: "General & SEO"
        file: "src/content/settings/general.md"
        fields:
          - { name: "site_title", label: "Browser tab title", widget: "string" }
          - { name: "meta_description", label: "Meta description", widget: "text", hint: "150-160 characters" }
          - { name: "meta_keywords", label: "SEO keywords", widget: "string", required: false }
          - { name: "og_title", label: "Social share title", widget: "string" }
          - { name: "og_description", label: "Social share description", widget: "text" }
          - { name: "og_image", label: "Social share image (1200×630)", widget: "image", required: false }

      - name: "nav"
        label: "Navigation"
        file: "src/content/settings/nav.md"
        fields:
          - name: "links"
            label: "Top navigation links"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "href", label: "Link", widget: "string" }
          - { name: "cta_label", label: "CTA button text", widget: "string" }
          - { name: "cta_href", label: "CTA button link", widget: "string" }

      - name: "footer"
        label: "Footer"
        file: "src/content/settings/footer.md"
        fields:
          - { name: "brand_description", label: "Brand description", widget: "text" }
          - { name: "tagline", label: "Tagline", widget: "string" }
          - name: "links"
            label: "Footer links"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "href", label: "Link", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # HOMEPAGE — All sections in one collection
  # ═══════════════════════════════════════════════════════════
  - name: "homepage"
    label: "Homepage"
    description: "All homepage sections"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/homepage/hero.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "title", label: "Headline", widget: "text" }
          - { name: "body", label: "Body text", widget: "markdown" }
          - { name: "background_image", label: "Background image", widget: "image" }
          - { name: "background_image_alt", label: "Image alt text", widget: "string" }
          - { name: "scroll_indicator", label: "Scroll indicator text", widget: "string" }

      - name: "letter"
        label: "Philosophy Letter"
        file: "src/content/homepage/letter.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "chapter_label", label: "Chapter label", widget: "string" }
          - { name: "headline", label: "Headline", widget: "text" }
          - { name: "lead", label: "Lead paragraph", widget: "text" }
          - { name: "body", label: "Body", widget: "markdown" }
          - { name: "signature", label: "Signature", widget: "string" }

      - name: "pillars"
        label: "Brand Pillars"
        file: "src/content/homepage/pillars.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "intro_eyebrow", label: "Intro eyebrow", widget: "string" }
          - { name: "intro_headline", label: "Intro headline", widget: "text" }
          - name: "items"
            label: "Pillar cards"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "subtitle", label: "Subtitle", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "image", label: "Image", widget: "image" }
              - { name: "image_alt", label: "Image alt", widget: "string" }

      - name: "destinations"
        label: "Destinations"
        file: "src/content/homepage/destinations.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "intro_eyebrow", label: "Intro eyebrow", widget: "string" }
          - { name: "intro_headline", label: "Intro headline", widget: "text" }
          - { name: "intro_body", label: "Intro body", widget: "markdown" }

      - name: "experiences"
        label: "Experiences"
        file: "src/content/homepage/experiences.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "intro_eyebrow", label: "Intro eyebrow", widget: "string" }
          - { name: "intro_headline", label: "Intro headline", widget: "text" }
          - { name: "intro_body", label: "Intro body", widget: "markdown" }
          - name: "items"
            label: "Experience cards"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "subtitle", label: "Subtitle", widget: "string" }
              - { name: "image", label: "Image", widget: "image" }
              - { name: "image_alt", label: "Image alt", widget: "string" }

      - name: "fieldnotes"
        label: "Field Notes"
        file: "src/content/homepage/fieldnotes.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "intro_eyebrow", label: "Intro eyebrow", widget: "string" }
          - { name: "intro_headline", label: "Intro headline", widget: "text" }
          - name: "postcards"
            label: "Postcards"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "location", label: "Location", widget: "string" }
              - { name: "date", label: "Date", widget: "string" }
              - { name: "image", label: "Image", widget: "image" }
              - { name: "image_alt", label: "Image alt", widget: "string" }

      - name: "planhotel"
        label: "Planhotel Family"
        file: "src/content/homepage/planhotel.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "text" }
          - { name: "body", label: "Body", widget: "markdown" }
          - name: "values"
            label: "Values"
            widget: "list"
            fields:
              - { name: "value", label: "Value", widget: "string" }
          - name: "sister_brands"
            label: "Sister brands"
            widget: "list"
            fields:
              - { name: "name", label: "Brand name", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "logo", label: "Logo", widget: "image" }
              - { name: "logo_alt", label: "Logo alt", widget: "string" }
              - { name: "href", label: "Link", widget: "string" }

      - name: "newsletter"
        label: "Newsletter"
        file: "src/content/homepage/newsletter.md"
        fields:
          - { name: "seo_title", label: "SEO Title", widget: "string" }
          - { name: "seo_description", label: "Meta Description", widget: "text" }
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "text" }
          - { name: "supporting", label: "Supporting text", widget: "text" }
          - { name: "button_label", label: "Button label", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # PROPERTIES
  # ═══════════════════════════════════════════════════════════
  - name: "properties"
    label: "Properties"
    description: "Property pages — auto-populates nav dropdown"
    folder: "src/content/properties"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { name: "seo_title", label: "SEO Title", widget: "string" }
      - { name: "seo_description", label: "Meta Description", widget: "text" }
      - { name: "name", label: "Property name", widget: "string" }
      - { name: "short_name", label: "Short name", widget: "string" }
      - { name: "location", label: "Location", widget: "string" }
      - { name: "tagline", label: "Tagline", widget: "string" }
      - { name: "description", label: "Description", widget: "markdown" }
      - { name: "hero_image", label: "Hero image", widget: "image" }
      - { name: "hero_image_alt", label: "Hero image alt", widget: "string" }
      - { name: "specs_label", label: "Specs label", widget: "string" }
      - name: "specs"
        label: "Specs"
        widget: "list"
        fields:
          - { name: "label", label: "Label", widget: "string" }
          - { name: "value", label: "Value", widget: "string" }
      - { name: "cta_label", label: "CTA text", widget: "string" }
      - { name: "cta_href", label: "CTA link", widget: "string" }
      - { name: "show_in_nav", label: "Show in nav", widget: "boolean", default: true }
