backend:
  name: github
  repo: marcorosso-collab/Exploreans-Brand-Site
  branch: main
  base_url: https://openclaw.onrender.com
  auth_endpoint: auth

media_folder: "public/images"
public_folder: "/images"

publish_mode: editorial_workflow

site_url: https://exploreans.com
display_url: https://exploreans.com

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General & SEO"
        file: "src/content/settings/general.md"
        fields:
          - { name: "site_title", label: "Browser tab title", widget: "string" }
          - { name: "meta_description", label: "SEO meta description", widget: "text" }

  - name: "hero"
    label: "Homepage Hero"
    folder: "src/content/hero"
    create: false
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "body", label: "Body", widget: "markdown" }
