backend:
  name: github
  repo: marcorosso-collab/Exploreans-Brand-Site
  branch: main
  base_url: https://openclaw.onrender.com
  auth_endpoint: auth

media_folder: "public/images"
public_folder: "/images"

collections:

  # ═══════════════════════════════════════════════════════════
  # SITE SETTINGS
  # ═══════════════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    folder: "src/content/settings"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "Site Title", name: "site_title", widget: "string" }
      - { label: "Meta Description", name: "meta_description", widget: "text" }
      - { label: "SEO Keywords", name: "meta_keywords", widget: "string", required: false }
      - { label: "Social Share Title", name: "og_title", widget: "string" }
      - { label: "Social Share Description", name: "og_description", widget: "text" }
      - { label: "Social Share Image", name: "og_image", widget: "image", required: false }
      - name: "nav_links"
        label: "Navigation Links"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "href", widget: "string" }
      - { label: "CTA Button Label", name: "cta_label", widget: "string" }
      - { label: "CTA Button URL", name: "cta_href", widget: "string" }
      - { label: "Footer Brand Description", name: "brand_description", widget: "text" }
      - { label: "Footer Tagline", name: "tagline", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════════════════
  - name: "hero"
    label: "Hero"
    folder: "src/content/hero"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Headline", name: "title", widget: "text" }
      - { label: "Body Text", name: "body", widget: "markdown" }
      - { label: "Background Image", name: "background_image", widget: "image" }
      - { label: "Image Alt Text", name: "background_image_alt", widget: "string" }
      - { label: "Scroll Indicator", name: "scroll_indicator", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # NOTE FROM THE FIELD (Philosophy Letter)
  # ═══════════════════════════════════════════════════════════
  - name: "letter"
    label: "Note From The Field"
    folder: "src/content/letter"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Chapter Label", name: "chapter_label", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Lead Paragraph", name: "lead", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Signature", name: "signature", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # BRAND PILLARS (Three ideas we hold to)
  # ═══════════════════════════════════════════════════════════
  - name: "pillars"
    label: "Brand Pillars"
    folder: "src/content/pillars"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Intro Eyebrow", name: "intro_eyebrow", widget: "string" }
      - { label: "Intro Headline", name: "intro_headline", widget: "text" }
      - name: "pillars"
        label: "Pillar Cards"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt", name: "image_alt", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # DESTINATIONS / PROPERTIES
  # ═══════════════════════════════════════════════════════════
  - name: "destinations"
    label: "Destinations"
    folder: "src/content/destinations"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Intro Eyebrow", name: "intro_eyebrow", widget: "string" }
      - { label: "Intro Headline", name: "intro_headline", widget: "text" }
      - { label: "Intro Body", name: "intro_body", widget: "markdown" }

  # ═══════════════════════════════════════════════════════════
  # EXPERIENCES
  # ═══════════════════════════════════════════════════════════
  - name: "experiences"
    label: "Experiences"
    folder: "src/content/experiences"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Intro Eyebrow", name: "intro_eyebrow", widget: "string" }
      - { label: "Intro Headline", name: "intro_headline", widget: "text" }
      - { label: "Intro Body", name: "intro_body", widget: "markdown" }
      - name: "experiences"
        label: "Experience Cards"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt", name: "image_alt", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # FIELD NOTES
  # ═══════════════════════════════════════════════════════════
  - name: "fieldnotes"
    label: "Field Notes"
    folder: "src/content/fieldnotes"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Intro Eyebrow", name: "intro_eyebrow", widget: "string" }
      - { label: "Intro Headline", name: "intro_headline", widget: "text" }
      - name: "postcards"
        label: "Postcards"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Date", name: "date", widget: "string" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt", name: "image_alt", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # PLANHOTEL FAMILY
  # ═══════════════════════════════════════════════════════════
  - name: "planhotel"
    label: "Planhotel Family"
    folder: "src/content/planhotel"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - name: "values"
        label: "Values"
        widget: "list"
        fields:
          - { label: "Value", name: "value", widget: "string" }
      - name: "sister_brands"
        label: "Sister Brands"
        widget: "list"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Logo Alt", name: "logo_alt", widget: "string" }
          - { label: "Link", name: "href", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # JOURNAL / NEWSLETTER
  # ═══════════════════════════════════════════════════════════
  - name: "journal"
    label: "Journal"
    folder: "src/content/journal"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Supporting Text", name: "supporting", widget: "text" }
      - { label: "Button Label", name: "button_label", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # PROPERTIES
  # ═══════════════════════════════════════════════════════════
  - name: "properties"
    label: "Properties"
    folder: "src/content/properties"
    create: true
    delete: true
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string" }
      - { label: "SEO Description", name: "seo_description", widget: "text" }
      - { label: "Property Name", name: "name", widget: "string" }
      - { label: "Short Name", name: "short_name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Hero Image", name: "hero_image", widget: "image" }
      - { label: "Hero Image Alt", name: "hero_image_alt", widget: "string" }
      - { label: "Specs Label", name: "specs_label", widget: "string" }
      - name: "specs"
        label: "Specs"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - { label: "CTA Label", name: "cta_label", widget: "string" }
      - { label: "CTA Link", name: "cta_href", widget: "string" }
      - { label: "Show in Nav", name: "show_in_nav", widget: "boolean", default: true }
