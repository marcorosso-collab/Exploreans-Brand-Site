backend:
  name: github
  repo: marcorosso-collab/Exploreans-Brand-Site
  branch: main
  base_url: https://openclaw.onrender.com
  auth_endpoint: auth

media_folder: "public/images"
public_folder: "/images"

collections:

  # ═══════════════════════════════════════════════════════════
  # SETTINGS (Navigation & Site Config)
  # ═══════════════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    folder: "src/content/settings"
    create: false
    delete: false
    extension: json
    format: json
    files:
      - name: "nav"
        label: "Navigation"
        file: "src/content/settings/nav.json"
        fields:
          - { label: "Logo Image", name: "logo", widget: "image", required: false }
          - { label: "Logo Alt Text", name: "logo_alt", widget: "string", required: false }
          - { label: "Wordmark Main", name: "wordmark_main", widget: "string", required: false }
          - { label: "Wordmark Sub", name: "wordmark_sub", widget: "string", required: false }
          - name: "links"
            label: "Navigation Links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "href", widget: "string" }
          - { label: "CTA Button Label", name: "cta_label", widget: "string" }
          - { label: "CTA Button URL", name: "cta_href", widget: "string" }
          - { label: "CTA Show Dropdown", name: "cta_show_dropdown", widget: "boolean", default: true }
          - name: "properties_dropdown"
            label: "Properties Dropdown (auto-populated from Properties collection)"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "href", widget: "string" }
              - { label: "Location", name: "location", widget: "string", required: false }

  # ═══════════════════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════════════════
  - name: "hero"
    label: "Hero"
    folder: "src/content/hero"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Volume Label", name: "volume_label", widget: "string" }
      - { label: "Title Line 1", name: "title_line_1", widget: "string" }
      - { label: "Title Line 2", name: "title_line_2", widget: "string" }
      - { label: "Body Paragraph 1", name: "body_1", widget: "text" }
      - { label: "Body Paragraph 2", name: "body_2", widget: "text" }
      - { label: "Bottom Left Text", name: "bottom_left", widget: "string" }
      - { label: "Scroll Label", name: "scroll_label", widget: "string" }
      - { label: "Background Image", name: "background_image", widget: "image" }
      - { label: "Background Alt Text", name: "background_alt", widget: "string", required: false }

  # ═══════════════════════════════════════════════════════════
  # LETTER (Note From The Field)
  # ═══════════════════════════════════════════════════════════
  - name: "letter"
    label: "Note From The Field"
    folder: "src/content/letter"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Chapter Number", name: "chapter_number", widget: "string" }
      - { label: "Chapter Label", name: "chapter_label", widget: "string" }
      - { label: "Dateline", name: "dateline", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Lead Paragraph", name: "lead", widget: "text" }
      - name: "body_paragraphs"
        label: "Body Paragraphs"
        widget: "list"
        fields:
          - { label: "Text", name: "text", widget: "text" }
      - { label: "Signature Name", name: "signature_name", widget: "string" }
      - { label: "Signature Role", name: "signature_role", widget: "string", required: false }

  # ═══════════════════════════════════════════════════════════
  # PILLARS INTRO
  # ═══════════════════════════════════════════════════════════
  - name: "pillarsintro"
    label: "Pillars Intro"
    folder: "src/content/pillarsintro"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Supporting Text", name: "supporting", widget: "text" }

  # ═══════════════════════════════════════════════════════════
  # PILLARS
  # ═══════════════════════════════════════════════════════════
  - name: "pillars"
    label: "Brand Pillars"
    folder: "src/content/pillars"
    create: true
    delete: true
    extension: json
    format: json
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Numeral", name: "numeral", widget: "string" }
      - { label: "Phrase Line 1", name: "phrase_line_1", widget: "string" }
      - { label: "Phrase Line 2", name: "phrase_line_2", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  # ═══════════════════════════════════════════════════════════
  # PLACES INTRO
  # ═══════════════════════════════════════════════════════════
  - name: "placesintro"
    label: "Places Intro"
    folder: "src/content/placesintro"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Supporting Text", name: "supporting", widget: "text" }

  # ═══════════════════════════════════════════════════════════
  # PROPERTIES
  # ═══════════════════════════════════════════════════════════
  - name: "properties"
    label: "Properties"
    folder: "src/content/properties"
    create: true
    delete: true
    extension: json
    format: json
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Property Name", name: "name", widget: "text" }
      - { label: "Short Name", name: "short_name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "text" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Image Alt", name: "image_alt", widget: "string", required: false }
      - { label: "Tag Label", name: "tag_label", widget: "string" }
      - name: "specs"
        label: "Specs"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - { label: "CTA Label", name: "cta_label", widget: "string" }
      - { label: "CTA Link", name: "cta_href", widget: "string" }
      - { label: "Show in Nav", name: "show_in_nav", widget: "boolean", default: true }

  # ═══════════════════════════════════════════════════════════
  # BEYOND (Experiences Intro)
  # ═══════════════════════════════════════════════════════════
  - name: "beyond"
    label: "Experiences Intro"
    folder: "src/content/beyond"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Aside Text", name: "aside", widget: "text" }

  # ═══════════════════════════════════════════════════════════
  # EXPERIENCES
  # ═══════════════════════════════════════════════════════════
  - name: "experiences"
    label: "Experiences"
    folder: "src/content/experiences"
    create: true
    delete: true
    extension: json
    format: json
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Number", name: "number", widget: "string" }
      - { label: "Title", name: "title", widget: "text" }
      - { label: "Description", name: "description", widget: "text" }

  # ═══════════════════════════════════════════════════════════
  # NOTES INTRO
  # ═══════════════════════════════════════════════════════════
  - name: "notesintro"
    label: "Field Notes Intro"
    folder: "src/content/notesintro"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Supporting Text", name: "supporting", widget: "text" }

  # ═══════════════════════════════════════════════════════════
  # FIELD NOTES
  # ═══════════════════════════════════════════════════════════
  - name: "fieldnotes"
    label: "Field Notes"
    folder: "src/content/fieldnotes"
    create: true
    delete: true
    extension: json
    format: json
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Image Alt", name: "image_alt", widget: "string", required: false }
      - { label: "Caption", name: "caption", widget: "string" }
      - { label: "Meta", name: "meta", widget: "string", required: false }

  # ═══════════════════════════════════════════════════════════
  # GROUP (Planhotel Family)
  # ═══════════════════════════════════════════════════════════
  - name: "group"
    label: "Planhotel Family"
    folder: "src/content/group"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Label", name: "label", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Body", name: "body", widget: "text" }
      - name: "values"
        label: "Values"
        widget: "list"
        fields:
          - { label: "Value", name: "value", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # SISTER BRANDS
  # ═══════════════════════════════════════════════════════════
  - name: "sisterbrands"
    label: "Sister Brands"
    folder: "src/content/sisterbrands"
    create: true
    delete: true
    extension: json
    format: json
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Mark", name: "mark", widget: "string" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Link", name: "href", widget: "string" }

  # ═══════════════════════════════════════════════════════════
  # JOURNAL
  # ═══════════════════════════════════════════════════════════
  - name: "journal"
    label: "Journal"
    folder: "src/content/journal"
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
      - { label: "Headline", name: "headline", widget: "text" }
      - { label: "Supporting Text", name: "supporting", widget: "text" }
      - { label: "Input Placeholder", name: "input_placeholder", widget: "string" }
      - { label: "Button Label", name: "button_label", widget: "string" }
      - { label: "Success Message", name: "success_message", widget: "string" }
